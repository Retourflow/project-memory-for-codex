name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Test benchmark fixture
        run: |
          PYTHONPATH=benchmarks/fixture-project/src \
            python -m unittest discover -s benchmarks/fixture-project/tests -v

      - name: Validate project memory
        run: |
          python scripts/validate.py .
          python scripts/validate.py benchmarks/fixture-project
          python scripts/validate_skill.py skill/codex-project-memory

      - name: Reproduce benchmark report
        run: python benchmarks/run.py

      - name: Verify generated reports are current
        run: git diff --exit-code
